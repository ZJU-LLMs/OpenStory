<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldKernel — 世界生成</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>WorldKernel</h1>
      <p class="subtitle">输入一句话，生成你的世界</p>
    </header>

    <section class="input-section">
      <textarea id="worldInput" placeholder="例如：创建最后一部中的霍格沃茨魔法学院" rows="3"></textarea>
      <button id="submitBtn" onclick="submitInput()">开始生成</button>
    </section>

    <section class="status-section" id="statusSection" style="display:none">
      <div class="spinner"></div>
      <span id="statusText">解析中…</span>
    </section>

    <section class="result-section" id="resultSection" style="display:none">
      <div class="result-header">
        <h2>Stage 1 完成</h2>
        <span class="session-id" id="sessionId"></span>
      </div>
      <p id="resultMsg" style="color:#94a3b8;margin-top:.5rem"></p>
    </section>

    <section class="error-section" id="errorSection" style="display:none">
      <p id="errorText"></p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
