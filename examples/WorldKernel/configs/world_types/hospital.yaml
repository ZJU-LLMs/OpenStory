world_template:
  type: hospital_world
  tags: [hospital, medical, institution, workflow]
  default_locations:
    - 急诊室
    - 手术室
    - 病房
    - 走廊
    - 护士站
    - 药房
  default_roles: [doctor, nurse, patient, administrator]
  default_rules:
    - 诊疗规则
    - 排班规则
    - 药品管理规则

character_template:
  role_options: [doctor, nurse, patient, administrator]
  personality_pool: [专注, 耐心, 果断, 细心]
  goal_templates:
    doctor: [治愈患者, 提升医术, 完成研究]
    nurse: [照料患者, 执行医嘱, 维护秩序]
    patient: [康复, 寻求帮助]

location_template:
  types: [treatment_room, ward, corridor, reception, pharmacy, operating_room]
